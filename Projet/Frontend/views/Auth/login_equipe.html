<!DOCTYPE html>
<html lang="fr" dir="ltr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Espace Equipe - Login</title>
</head>

<body class="bg-gray-100 font-sans h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center">
        <!-- Conteneur principal -->
        <div class="w-full h-full flex flex-col md:flex-row">

            <!-- Section gauche (formulaire + contenu mobile) -->
            <section class="w-full md:w-1/2 bg-white flex flex-col items-center justify-center p-6 space-y-6">
                
                <!-- Texte visible uniquement en mobile -->
                <div class="block md:hidden text-center text-white bg-blue-600 w-full rounded-md py-6 px-4">
                    <h1 class="text-3xl font-bold">Espace Equipe</h1>
                    <p class="mt-2 text-sm">Accédez à votre espace personnel</p>
                </div>

                <!-- Formulaire -->
                <div class="w-full max-w-md">
                    <form id="formLogin" action="#" method="post" role="form" class="space-y-5">
                        <fieldset class="space-y-4">
                            <div>
                                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input id="email" name="email" placeholder="Votre email" required type="email"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150" />
                            </div>

                            <div>
                                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mot de Passe</label>
                                <input id="password" name="password" placeholder="Votre mot de passe" required
                                    type="password"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150" />
                            </div>

                            <div class="pt-2">
                                <button id="btnSubmit"
                                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition duration-150 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                                    type="button">CONNEXION</button>
                            </div>

                            <div class="text-center pt-1">
                                <a href="#"
                                    class="text-sm text-blue-600 hover:text-blue-800 font-medium transition duration-150">
                                    Mot de passe oublié ?
                                </a>
                            </div>
                        </fieldset>
                    </form>
                </div>
            </section>

            <!-- Bannière visible uniquement en md et + -->
            <section class="hidden md:flex w-full md:w-1/2 bg-gradient-to-r from-blue-800 to-blue-600 relative items-center justify-center">
                <!-- Image -->
                <div class="absolute inset-0 z-0">
                    <img src="./../../asset/espace_personnel.jpg" alt="Espace personnel"
                        class="w-full h-full object-cover opacity-40" />
                </div>

                <!-- Texte centré -->
                <div class="relative z-10 text-center text-white p-8">
                    <h1 class="text-4xl font-bold">Espace Equipe</h1>
                    <p class="mt-4 text-base">Accédez à votre espace personnel</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-2 border-t border-gray-200 text-center text-sm text-gray-600">
        <p>Système de Gestion Scolaire &copy; 2025</p>
    </footer>
</body>

</html>
