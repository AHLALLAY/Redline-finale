<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Elève - Inscription</title>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-orange-400 shadow-md">
        <nav class="container mx-auto px-4 py-2">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center">
                        <span class="text-orange-500 font-bold">A</span>
                    </div>
                    <div class="text-white">
                        <p class="text-sm">Bienvenue</p>
                        <h2 class="font-semibold">Admin</h2>
                    </div>
                </div>
                <button
                    class="px-4 py-2 rounded-md bg-red-500 hover:bg-red-600 text-white flex items-center gap-2 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z"
                            clip-rule="evenodd" />
                    </svg>
                    Déconnexion
                </button>
            </div>
        </nav>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-md p-4">
            <nav class="space-y-2">
                <button onclick="dashboardAdmin()"
                    class="w-full px-4 py-3 text-left rounded-md hover:bg-blue-300 text-gray-700 flex items-center gap-3 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path
                            d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                    </svg>
                    Tableau de bord
                </button>
                <button
                    class="w-full px-4 py-3 text-left rounded-md text-white flex items-center gap-3 bg-blue-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6z" />
                    </svg>
                    Elèves
                </button>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <div class="overflow-y-auto p-4 md:p-8">
                <div class="max-w-6xl mx-auto space-y-8">
                    <!-- student's info -->
                    <section class="bg-white rounded-lg shadow-md p-6">
                        <article>
                            <h2 class="text-xl font-bold text-gray-800 mb-6 pb-2 border-b border-gray-200">Information pour l'élève</h2>
                            <form action="#">
                                <fieldset class="flex flex-col md:flex-row gap-4">
                                    <div class="flex-1 space-y-2">
                                        <label for="studentName" class="block text-sm font-medium text-gray-700">Nom complet <span class="text-red-500">*</span></label>
                                        <input type="text" id="studentName" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                                    </div>
                                    <div class="flex-1 space-y-2">
                                        <label for="studentBirthDay" class="block text-sm font-medium text-gray-700">Date de Naissance</label>
                                        <input type="date" id="studentBirthDay" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                                    </div>
                                    <div class="flex-1 space-y-2">
                                        <label for="studentLevel" class="block text-sm font-medium text-gray-700">Niveau scolaire <span class="text-red-500">*</span></label>
                                        <select name="levels" id="levels" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                                            <option value="default">Choisir ...</option>
                                            <option value="c1">Première Année Primaire</option>
                                            <option value="c2">Deuxième Année Primaire</option>
                                            <option value="c3">Troisième Année Primaire</option>
                                            <option value="c4">Quatrième Année Primaire</option>
                                            <option value="c5">Cinquième Année Primaire</option>
                                            <option value="c6">Sixième Année Primaire</option>
                                        </select>
                                    </div>
                                </fieldset>
                                <div class="mt-6 flex justify-end">
                                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                        Sauvegarder
                                    </button>
                                </div>
                            </form>
                        </article>
                    </section>

                    <!-- parent's info -->
                    <section class="bg-white rounded-lg shadow-md p-6">
                        <article>
                            <h2 class="text-xl font-bold text-gray-800 mb-6 pb-2 border-b border-gray-200">Informations pour les parents</h2>
                            <form action="#">
                                <fieldset class="flex flex-col md:flex-row gap-4">
                                    <div class="flex-1 space-y-2">
                                        <label for="parentName" class="block text-sm font-medium text-gray-700">Nom complet <span class="text-red-500">*</span></label>
                                        <input type="text" id="parentName" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                                    </div>
                                    <div class="flex-1 space-y-2">
                                        <label for="parentBirthDay" class="block text-sm font-medium text-gray-700">Date de Naissance <span class="text-red-500">*</span></label>
                                        <input type="date" id="parentBirthDay" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                                    </div>
                                    <div class="flex-1 space-y-2">
                                        <label for="parentPhone" class="block text-sm font-medium text-gray-700">Téléphone <span class="text-red-500">*</span></label>
                                        <input type="tel" id="parentPhone" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                                    </div>
                                    <div class="flex-1 space-y-2">
                                        <label for="address" class="block text-sm font-medium text-gray-700">Adresse <span class="text-red-500">*</span></label>
                                        <input type="text" id="address" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                                    </div>
                                </fieldset>
                                <div class="mt-6 flex justify-end">
                                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                        Sauvegarder
                                    </button>
                                </div>
                            </form>
                        </article>
                    </section>
                </div>
            </div>
        </main>
    </div>
    <footer class="py-2 text-center text-gray-600 text-sm bg-white border-t border-gray-200">
        <p>Système de Gestion Scolaire &copy; 2025</p>
    </footer>

    <script src="./../../js/transaction.js"></script>
</body>

</html>
