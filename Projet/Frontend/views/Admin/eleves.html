<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Élèves - Admin</title>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-orange-400 shadow-md">
        <nav class="container mx-auto px-4 py-2">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center">
                        <span class="text-orange-500 font-bold">A</span>
                    </div>
                    <div class="text-white">
                        <p class="text-sm">Bienvenue</p>
                        <h2 class="font-semibold">Admin</h2>
                    </div>
                </div>
                <button
                    class="px-4 py-2 rounded-md bg-red-500 hover:bg-red-600 text-white flex items-center gap-2 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z"
                            clip-rule="evenodd" />
                    </svg>
                    Déconnexion
                </button>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-md p-4">
            <nav class="space-y-2">
                <a href="dashboard_admin.html"
                    class="w-full px-4 py-3 text-left rounded-md hover:bg-blue-300 text-gray-700 flex items-center gap-3 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path
                            d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                    </svg>
                    Tableau de bord
                </a>
                <a href="eleves.html"
                    class="w-full px-4 py-3 text-left rounded-md text-white flex items-center gap-3 bg-blue-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6z" />
                    </svg>
                    Élèves
                </a>
                <a href="personnels.html"
                    class="w-full px-4 py-3 text-left rounded-md text-gray-700 flex items-center gap-3 hover:bg-blue-300 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                            clip-rule="evenodd" />
                    </svg>
                    Personnels
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-auto p-8">
            <div class="max-w-6xl mx-auto">
                <h1 class="text-2xl font-bold text-gray-800 mb-6">Gestion des Élèves</h1>

                <!-- Search and Add Button -->
                <div class="flex justify-between items-center mb-6">
                    <div class="flex space-x-4">
                        <div class="relative w-64">
                            <input type="text" placeholder="Rechercher un élève..."
                                class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                        <div class="relative w-64">
                            <select name="classes" id="classe"
                                class="text-gray-500 w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="default">Choisir ...</option>
                                <option value="c1">Première Année Primaire</option>
                                <option value="c2">Deuxième Année Primaire</option>
                                <option value="c3">Troisième Année Primaire</option>
                                <option value="c4">Quatrième Année Primaire</option>
                                <option value="c5">Cinquième Année Primaire</option>
                                <option value="c6">Sixième Année Primaire</option>
                            </select>
                        </div>
                    </div>
                    <!-- button pour affiche le modal d'ajoute -->
                    <button onclick="addEleve()" class="p-2 bg-green-600 text-white rounded-full hover:bg-blue-700 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"
                                clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>

                <!-- Students List -->
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-6">
                        <!-- Student Card 1 -->
                        <article class="border rounded-lg p-4 hover:shadow-md transition-shadow">
                            <div class="flex items-center space-x-4 mb-4">
                                <div class="w-16 h-16 rounded-full bg-gray-200 flex items-center justify-center">
                                    <span class="text-gray-500 text-xl">JD</span>
                                </div>
                                <div>
                                    <h4 class="font-semibold text-lg">Jean Dupont</h4>
                                    <p class="text-gray-600">CM2 A</p>
                                </div>
                            </div>
                            <div class="flex justify-between text-sm text-gray-500">
                                <p>Inscrit le: 15/09/2023</p>
                                <p>Niveau: CM2</p>
                            </div>
                            <div class="mt-4 flex space-x-2">
                                <button
                                    class="px-3 py-1 bg-blue-100 text-blue-600 rounded text-sm hover:bg-blue-200">Détails</button>
                                <button
                                    class="px-3 py-1 bg-red-100 text-red-600 rounded text-sm hover:bg-red-200">Supprimer</button>
                            </div>
                        </article>

                        <!-- Student Card 2 -->
                        <article class="border rounded-lg p-4 hover:shadow-md transition-shadow">
                            <div class="flex items-center space-x-4 mb-4">
                                <div class="w-16 h-16 rounded-full bg-gray-200 flex items-center justify-center">
                                    <span class="text-gray-500 text-xl">MD</span>
                                </div>
                                <div>
                                    <h4 class="font-semibold text-lg">Marie Durand</h4>
                                    <p class="text-gray-600">CE1 B</p>
                                </div>
                            </div>
                            <div class="flex justify-between text-sm text-gray-500">
                                <p>Inscrit le: 02/09/2023</p>
                                <p>Niveau: CE1</p>
                            </div>
                            <div class="mt-4 flex space-x-2">
                                <button
                                    class="px-3 py-1 bg-blue-100 text-blue-600 rounded text-sm hover:bg-blue-200">Détails</button>
                                <button
                                    class="px-3 py-1 bg-red-100 text-red-600 rounded text-sm hover:bg-red-200">Supprimer</button>
                            </div>
                        </article>

                        <!-- Add more student cards here -->
                    </div>

                    <!-- Pagination -->
                    <div class="border-t px-6 py-4 flex justify-between items-center">
                        <span class="text-sm text-gray-600">Affichage de 1 à 2 sur 12 élèves</span>
                        <div class="flex space-x-2">
                            <button class="px-3 py-1 border rounded text-sm hover:bg-gray-100">Précédent</button>
                            <button class="px-3 py-1 border rounded bg-blue-600 text-white text-sm">1</button>
                            <button class="px-3 py-1 border rounded text-sm hover:bg-gray-100">2</button>
                            <button class="px-3 py-1 border rounded text-sm hover:bg-gray-100">Suivant</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="./../../js/transaction.js"></script>
</body>

</html>
